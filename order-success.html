<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesanan Berhasil — AR Pashmina</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container bar">
    <a href="index.html" class="brand">AR <small>Pashmina Studio</small></a>
    <nav class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="shop.html">Belanja</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="icon-btn" aria-label="Keranjang">
        🛍️
        <span class="cart-count" data-cart-count style="display:none">0</span>
      </a>
    </div>
  </div>
</header>

<div class="container" id="success-wrap"></div>

<footer class="site-footer">
  <div class="container footer-bottom" style="border-top:1px solid rgba(247,241,232,.12)">
    <span>© 2026 AR Pashmina Studio.</span>
    <span>Situs demo — pembayaran bersifat simulasi.</span>
  </div>
</footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/ui.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const order = arGetOrder(params.get('id'));
  const wrap = document.getElementById('success-wrap');

  const paymentLabel = { qris:'QRIS', transfer:'Transfer Bank', cod:'Bayar di Tempat (COD)' };

  if(!order){
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="ic">❓</div>
        <h3>Pesanan tidak ditemukan</h3>
        <a href="shop.html" class="btn btn-primary">Kembali Belanja</a>
      </div>`;
  } else {
    wrap.innerHTML = `
      <div class="success-box">
        <div class="success-icon">✓</div>
        <h1 style="font-size:1.8rem;">Pesanan Berhasil Dibuat!</h1>
        <p>Terima kasih, ${order.customer.name}. Pesananmu sudah kami terima dan akan segera diproses.</p>
        <div class="order-id-box">
          <div style="font-size:.78rem;color:#8a8073;margin-bottom:6px;">Nomor Pesanan</div>
          <div class="id">${order.id}</div>
        </div>
        <div style="text-align:left;background:#fff;border:1px solid var(--line);border-radius:var(--radius-m);padding:20px;margin-bottom:24px;">
          <div class="summary-row"><span>Metode Pembayaran</span><span>${paymentLabel[order.payment]}</span></div>
          <div class="summary-row"><span>Dikirim ke</span><span>${order.customer.city}</span></div>
          <div class="summary-row total"><span>Total Bayar</span><span>${arFormatIDR(order.total)}</span></div>
        </div>
        <p style="font-size:.82rem;color:#8a8073;">Halaman ini adalah simulasi demo — status pesanan dapat dipantau/diubah oleh admin melalui Admin Panel.</p>
        <div class="hero-cta" style="justify-content:center;">
          <a href="shop.html" class="btn btn-primary">Belanja Lagi</a>
          <a href="admin/login.html" class="btn btn-outline">Buka Admin Panel</a>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
